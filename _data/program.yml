    - title: "Self-supervised Application-level Network Traffic Inversion"
      authors: "Darya Frolova (Huawei); Boris Nazarov (Huawei) and Pavel Kisilev (Huawei)"
      speaker: "Shaked Leibzirer (Huawei, Tel-Aviv)"
      abstract: "Fine-grained monitoring of network traffic is essential for application-level analysis. This need is particularly critical in campus networks as well as large-scale enterprise and service provider environments. However, due to resource limitations, traffic data is often collected using packet sampling techniques, which obstruct accurate temporal analysis. Although statistical scaling methods can estimate approximate total traffic volumes, they typically fail to capture fine-grained temporal dynamics. In this work, we propose a hybrid reconstruction framework that incorporates statistical modeling and attention-based deep neural network (DNN), which allows recovery of high-resolution application-level traffic from sampled data. We evaluated the proposed method on real-world campus network traces. The results demonstrate that our method outperforms traditional smoothing and interpolation techniques, enabling precise estimation of application-specific traffic patterns."
      bio: "Shaked Leibzirer is a research scientist at Huawei's Tel-Aviv research center, where he leads R&D in network performance optimization, real-time statistical simulation, and large language model–driven systems. His work spans algorithm design, lightweight task-specific fine-tuning, RAG systems, and the integration of LLMs into network engineering workflows, including a patented innovation in network reliability. Shaked holds an M.Sc. summa cum laude in Mathematics from the Technion, with research in random matrices and simplicial complexes, and has been recognized with multiple awards for both scientific excellence and innovation."
      slides: ./assets/slides/AI4Net_1.pdf
      paper: https://dl.acm.org/doi/10.1145/3769695.3771674
