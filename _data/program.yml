    - title: "SCALE-CCL: A Scalable Collective Communication Library for Wide-Area Distributed Training"
      authors: "Jiaheng Xiong (Politecnico di Milano); Qiaolun Zhang (Politecnico di Milano); Paolo Medagliani (Huawei); Michele Ferrero (Huawei); Xiaomin Liu (Shanghai Jiao Tong University); Meng Lian (Politecnico di Milano); Nicola Di Cicco (Politecnico di Milano); Baosen Zhao (Politecnico di Milano); Memedhe Ibrahimi (Politecnico di Milano); Francesco Musumeci (Politecnico di Milano) and Massimo Tornatore (Politecnico di Milano)"
      speaker: "Jiaheng Xiong (Politecnico di Milano)"
      abstract: "Collective Communication Libraries (CCLs) are widely used to coordinate and optimize data exchange among multiple GPUs. As training clusters increasingly span multiple datacenters for scalability and resource pooling, applying CCLs over wide-area networks (WANs) becomes essential. However, existing CCLs are primarily designed for stable, low-latency intra-datacenter environments. In contrast, WANs exhibit dynamic and unpredictable conditions that hinder traditional CCLs. While some recent solutions adopt global optimization techniques, such as Integer Linear Programming (ILP), to improve communication efficiency, these methods assume static topologies and full network visibility, which are often invalid in WAN environments characterized by link variability, limited observability, and dynamic traffic patterns. To address these challenges, we propose SCALE-CCL, a scalable collective heuristic algorithm for optimizing AllGather operations in WAN environments. SCALE-CCL generates global schedules offline from lightweight aggregated metrics (e.g., sampled bandwidth, queue status, and reception history). Thanks to its sub-second synthesis time, the schedule can be recomputed whenever needed, either before each training round or when significant WAN changes are observed, without incurring noticeable overhead.Compared to the state-of-the-art ILP-based solution TE-CCL and baselines including a shortest-path heuristic (SPH) and NCCL, SCALE-CCL reduces scheduling time by up to four orders of magnitude, while keeping the AllGather completion time within a 10% optimality gap in more than 90% of the evaluated scenarios (never exceeding 15%), and it consistently outperforms SPH and NCCL in WAN settings."
      paper: https://dl.acm.org/doi/10.1145/3769695.3771677
      slides: ./assets/slides/Net4AI_2.pdf
      bio: "Jiaheng Xiong is a first-year Ph.D. student at Politecnico di Milano, supervised by Prof. Francesco Musumeci and Prof. Massimo Tornatore. His research focuses on wide-area distributed training, collective communication optimization, and cross-datacenter network architectures. He works closely with industrial partners on accelerating large-scale AI workloads across geographically distributed datacenters. His broader interests include traffic engineering, networked systems, and the interplay between AI and networking."
