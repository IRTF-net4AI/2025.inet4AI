    - title: "Uno: A One-Stop Solution for Inter- and Intra-Datacenter Congestion Control and Reliable Connectivity"
      speaker: "Tommaso Bonato (Microsoft and ETH, Zürich)"
      abstract: "Cloud computing and AI workloads are driving unprecedented demand for efficient communication within and across datacenters. However, the coexistence of intra- and inter-datacenter traffic within datacenters, plus the disparity between the RTTs of intra- and inter-datacenter networks, complicates congestion management and traffic routing. Particularly, faster congestion responses of intra-datacenter traffic causes rate unfairness when competing with slower inter-datacenter flows. Additionally, inter-datacenter messages suffer from slow loss recovery and, thus, require reliability. Existing solutions overlook these challenges and handle inter- and intra-datacenter congestion with separate control loops or at different granularities. We propose Uno, a unified system for both inter- and intra-datacenter environments that integrates a transport protocol for rapid congestion reaction and fair rate control with a load-balancing scheme that combines erasure coding and adaptive routing. Our findings show that Uno significantly improves the completion times of both inter- and intra-datacenter flows compared to state-of-the-art methods such as Gemini."
      slides: ./assets/slides/Inv_Talk_1.pdf
      paper: https://dl.acm.org/doi/10.1145/3712285.3759884
      bio: "Tommaso Bonato received his BSc in computer science and engineering from the University of Bologna, Italy, and his MSc in computer science from ETH Zürich. During his studies he interned at the European Space Agency (ESA) and Amazon. He is currently pursuing his PhD at ETH Zürich under the supervision of Professor Torsten Hoefler. Tommaso is also a student researcher at Microsoft working on networking topics and Ultra Ethernet. His main research interests include networking protocols and topologies, high performance computing, and AI workloads."
