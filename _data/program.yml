    - title: "Latency-Optimal Load Balancing For Distributed MoE Inference"
      authors: "Venkata Pavan Kumar Miriyala (AMD, Singapore); German Sviridov (AMD, Singapore); Bingxu Chen (AMD, Singapore) and Haris Javaid (AMD, Singapore)"
      speaker: "German Sviridov (AMD, Singapore)"
      abstract: "Expert parallelism (EP) has emerged as a promising approach for scaling mixture-of-experts (MoE) inference across multiple devices. However, EP introduces imbalanced workloads among devices, resulting in poor performance and suboptimal hardware utilization rates.<br/><br/>
      Prior work addressed this issue by either employing auxiliary loss functions during training to encourage balanced token distribution or by dynamically replicating or reallocating experts across devices during inference. The latter approach can easily adapt to varying workloads, but leads to high data movement overheads that can impact end-to-end latencies and throughput.<br/><br/>
      In this work, we address this issue of high data movement overheads by proposing a novel latency-optimal algorithm for expert replication and reallocation. Our approach is capable of achieving up to a 12.5% reduction in MoE execution latency over naive expert assignment and enables us to load balance 2× more frequently compared to existing approaches in the literature."
      bio: "German Sviridov received his PhD from Politecnico di Torino and he is currently a Staff Researcher at AMD Singapore. His research interests revolve around data center networking and systems for AI."
      paper: https://dl.acm.org/doi/10.1145/3769695.3771675
