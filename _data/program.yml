    - title: "From Homogeneous to Disaggregated Architectures for Large Model Inference"
      speaker: "Mingxing Zhang (Tsinghua University, Beijing)"
      abstract: "Traditional large model inference architectures have been predominantly GPU-centric, owing to their significant advantages in both compute power and bandwidth. However, as GPU utilization approaches its bottleneck, achieving further cost reductions requires exploring new optimization paths.<br/><br/>
      Leveraging the distinct advantages of different devices—such as various GPU models or even CPU/DRAM for their bandwidth or capacity-cost benefits—while fully exploiting the model's inherent properties like sequential dependencies and sparsity, is becoming essential. Designing adaptive computational architectures for this new paradigm has emerged as a critical direction for future co-innovation across algorithms, systems, and hardware. This talk will discuss the current progress and future plans in this area."
      bio: "ZHANG, Mingxing is a Tenure-track Assistant Professor at Tsinghua University, focusing primarily on memory system research. Initiator of the open-source KVCache.AI projects Mooncake and KTransformers. Authored over 30 papers in prestigious international conferences and journals such as OSDI, SOSP, ASPLOS, HPCA, and EuroSys, including awards such as Best Paper at FAST, Distinguished Paper at SIGSOFT, and the first OSDI paper from a domestic Chinese university. Recipient of the ChinaSys Rising Star and Outstanding Doctoral Dissertation Awards, IEEE TCSC Outstanding Dissertation Award, selected into the China Association for Science and Technology’s Young Talent Support Project. Previously served as Chief Algorithm Technology Expert and Dean of the Innovation Research Institute at Sangfor Technologies, where incubated products have been deployed to tens of thousands of customers."
      slides: ./assets/slides/Inv_Talk_2.pdf
