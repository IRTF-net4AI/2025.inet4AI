    - title: "You've got a few GPUs, now what?! --- Experimenting with a Nano-Cluster for Distributed Training of AI Models"
      authors: "Giuseppe Aceto (University of Napoli Federico II); Ciro Guida (University of Napoli Federico II); Valerio Persico (University of Napoli Federico II) and Antonio Pescape (University of Napoli Federico II)"
      speaker: "Giuseppe Aceto (University of Napoli Federico II)"
      abstract: "The rapid growth of deep learning models---particularly large language models (LLMs)---has led to a widespread reliance on high-performance datacenters equipped with thousands of GPUs and fast interconnects. However, such infrastructures are often out of reach for academic researchers and institutions with limited computational budgets, and cloud services with GPUs offerings may be unadvisable for privacy or security reasons, or for the difficulty in predicting the total cost. While literature focuses almost exclusively on middle-to-hyper scale clusters, in this work we investigate the feasibility and limitations of distributed training of AI models in constrained environments by employing a minimal datacenter setup, composed of only two servers, each with 128 CPU cores, 512 GB of RAM, 2 consumer-grade GPUs, and interconnected via standard 1 Gigabit Ethernet. We focus on the scalability and the traffic generated during the training of AI architectures (ResNet-18 and GPT2) of different complexity in terms of the number of parameters and layers, and under various parallelization strategies and batch-size configurations. Our experimental results highlight critical bottlenecks in network communication and model synchronization, but also identify viable configurations that offer acceptable training throughput despite the limited hardware. This study aims to provide practical insights into low-cost, multi-GPU, multi-server training setups and inform future efforts to democratize deep learning research."
      paper: https://dl.acm.org/doi/10.1145/3769695.3771676
      slides: ./assets/slides/Net4AI_3.pdf
      bio: "Giuseppe Aceto is Associate Professor at the University of Napoli Federico II. He has a PhD in telecommunication engineering from the same University. His teachings include computer programming and blockchains. His research work falls in monitoring of network performance and security, with focus on advanced Deep Learning architectures for traffic classification and prediction, on which he has co-authored highly-cited papers in top-notch international journals. He is the recipient of several awards including the 2018 Best Journal Paper Award by IEEE CSIM, and the Computer Networks 2020 Best Paper Award."
